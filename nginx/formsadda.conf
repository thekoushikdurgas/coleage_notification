# ─────────────────────────────────────────────────────────────────────────────
# nginx/formsadda.conf
#
# Drop this file into /etc/nginx/sites-available/ on your host, then:
#   ln -s /etc/nginx/sites-available/formsadda.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# For HTTPS: replace the listen 80 block with a Certbot-managed SSL block.
# ─────────────────────────────────────────────────────────────────────────────

upstream formsadda_gunicorn {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name localhost;            # replace with your domain / IP

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/formsadda_access.log;
    error_log  /var/log/nginx/formsadda_error.log warn;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options        DENY;
    add_header X-XSS-Protection       "1; mode=block";

    # ── Static files served directly by Nginx (faster than Gunicorn) ─────────
    location /static/ {
        alias /app/static/;           # mount or symlink the container's static dir
        expires 7d;
        access_log off;
    }

    # ── SSE endpoint: disable buffering so events stream immediately ──────────
    location /stream {
        proxy_pass         http://formsadda_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Critical for SSE: disable all buffering
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;     # keep SSE connections open for 1 hour
        chunked_transfer_encoding on;
    }

    # ── All other requests → Gunicorn ─────────────────────────────────────────
    location / {
        proxy_pass         http://formsadda_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        client_max_body_size  10M;
    }
}
